# Climate panel config: zones and optional test/example data (same file).
# Zones: up to 4 climate entity_ids. Optional "name" overrides HA friendly name.
# Entities: optional; use as example and as fallback when HA entity is missing (e.g. offline).
# Entity IDs under "entities" should match your zone entity_ids.

zones:
  - entity_id: climate.living_room
    name: Living Room
  - entity_id: climate.bedroom
    name: Bedroom
  - entity_id: climate.office
    name: Office
  - entity_id: climate.guest_room
    name: Guest Room

# Example/test data: static config only (hvac_modes, min/max temp, etc.). Omit when using real HA only.
# state, current_temperature, and temperature come from Home Assistant at runtime.
entities:
  climate.living_room:
    attributes:
      hvac_modes: [heat, cool, off, auto]
      min_temp: 50
      max_temp: 90
      target_temp_step: 1
      friendly_name: Living Room

  climate.bedroom:
    attributes:
      hvac_modes: [heat, cool, off]
      min_temp: 50
      max_temp: 90
      target_temp_step: 1
      friendly_name: Bedroom

  climate.office:
    attributes:
      hvac_modes: [heat, cool, off, auto]
      min_temp: 55
      max_temp: 85
      target_temp_step: 1
      friendly_name: Office

  climate.guest_room:
    attributes:
      hvac_modes: [heat, cool, off, auto]
      min_temp: 50
      max_temp: 90
      target_temp_step: 1
      friendly_name: Guest Room
