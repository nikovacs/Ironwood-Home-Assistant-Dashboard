# Standalone test data for the Climate panel.
# Use when not connected to Home Assistant to fully test zone list, paned view,
# and controls. Loaded automatically; used as fallback when HA entity is missing.
#
# Structure mirrors HA climate entity state and attributes. Entity IDs must match
# your zone config (climate-zones.yaml) so the panel can look them up.

entities:
  climate.living_room:
    state: cool
    attributes:
      current_temperature: 72
      temperature: 73
      hvac_modes:
        - heat
        - cool
        - off
        - auto
      min_temp: 50
      max_temp: 90
      target_temp_step: 1
      friendly_name: Living Room

  climate.bedroom:
    state: heat
    attributes:
      current_temperature: 68
      temperature: 67
      hvac_modes:
        - heat
        - cool
        - off
      min_temp: 50
      max_temp: 90
      target_temp_step: 1
      friendly_name: Bedroom

  climate.office:
    state: off
    attributes:
      current_temperature: 71
      temperature: 72
      hvac_modes:
        - heat
        - cool
        - off
        - auto
      min_temp: 55
      max_temp: 85
      target_temp_step: 1
      friendly_name: Office

  climate.guest_room:
    state: auto
    attributes:
      current_temperature: 70
      temperature: 70
      hvac_modes:
        - heat
        - cool
        - off
        - auto
      min_temp: 50
      max_temp: 90
      target_temp_step: 1
      friendly_name: Guest Room
